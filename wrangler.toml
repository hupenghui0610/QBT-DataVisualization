# Cloudflare Pages：与静态站点同仓库部署时，将本文件放在仓库根目录。
# 1) 创建数据库：npx wrangler d1 create qbt-auth
# 2) 把下面 database_id 换成控制台输出的 ID
# 3) 绑定到 Pages 项目：Settings → Functions → D1 bindings（名称 DB），或沿用本文件在 wrangler pages deploy 时生效
# 4) 设置密钥：npx wrangler pages secret put JWT_SECRET --project-name=qbt-datavisualization

name = "qbt-datavisualization"
compatibility_date = "2024-11-01"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "qbt-auth"
database_id = "8e33f508-e226-4040-a4ba-df1754713733"
